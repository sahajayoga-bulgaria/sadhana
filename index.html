<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Садхана · Сахаджа Йога</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d1022; --bg2:#131728; --card:#181d33; --card-h:#1e2440;
  --border:#272d4e; --border-h:#3d4580;
  --gold:#c8a44c; --gold-l:#e6cc88; --gold-dim:rgba(200,164,76,0.12);
  --violet:#5a54b8; --violet-dim:rgba(90,84,184,0.15);
  --text:#e0dbd2; --text2:#8a8ab4; --text3:#4e4e72;
  --red:#b05555; --green:rgba(40,130,80,0.85);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html,body{height:100%;font-family:'Lora',Georgia,serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ── Auth ───────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(90,84,184,0.18) 0%,transparent 60%),
             radial-gradient(ellipse at 85% 100%,rgba(200,164,76,0.07) 0%,transparent 50%),
             var(--bg);}
.auth-card{max-width:380px;width:90%;text-align:center;padding:3rem 2.5rem;
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 80px rgba(90,84,184,0.08);}
.auth-om{font-family:'Cinzel',serif;font-size:3.8rem;color:var(--gold);line-height:1;
  margin-bottom:1.4rem;text-shadow:0 0 40px rgba(200,164,76,0.5);}
.auth-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:600;
  color:var(--gold-l);letter-spacing:.1em;margin-bottom:.3rem;}
.auth-sub{font-size:.72rem;letter-spacing:.2em;color:var(--text3);
  margin-bottom:1.8rem;text-transform:uppercase;}
.auth-desc{font-size:.88rem;color:var(--text2);margin-bottom:2rem;
  line-height:1.7;font-style:italic;}
.auth-divider{display:flex;align-items:center;gap:.8rem;margin-bottom:1.5rem;color:var(--text3);font-size:.7rem;letter-spacing:.1em}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
#g_id_signin{display:flex;justify-content:center}
.auth-err{margin-top:1rem;color:var(--red);font-size:.82rem;display:none}

/* ── App ───────────────────────── */
#app{min-height:100vh}
header{position:sticky;top:0;z-index:100;
  background:rgba(13,16,34,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);}
.hdr{max-width:1200px;margin:0 auto;padding:0 1.5rem;height:56px;
  display:flex;align-items:center;gap:1.5rem;}
.logo{display:flex;align-items:center;gap:.55rem;flex-shrink:0}
.logo-om{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold)}
.logo-tx{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold-l);letter-spacing:.1em}
.tab-nav{display:flex;gap:2px;flex:1}
.tab-btn{padding:.4rem 1.1rem;background:none;border:none;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.1em;
  color:var(--text2);border-radius:6px;transition:all .2s;}
.tab-btn:hover{color:var(--text);background:var(--card)}
.tab-btn.active{color:var(--gold);background:var(--gold-dim)}
.user-area{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.user-pic{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--gold);object-fit:cover}
.user-nm{font-size:.75rem;color:var(--text2);display:none}
@media(min-width:600px){.user-nm{display:block}}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text3);
  font-size:.72rem;padding:.28rem .65rem;border-radius:5px;cursor:pointer;
  font-family:'Lora',serif;transition:all .2s;}
.logout-btn:hover{border-color:var(--border-h);color:var(--text2)}

/* ── Sort bar ───────────────────────── */
.sort-bar{max-width:1200px;margin:0 auto;padding:.7rem 1.5rem;
  display:flex;align-items:center;gap:.7rem;}
.sort-lbl{font-size:.7rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.sort-btns{display:flex;gap:3px;background:var(--bg2);
  border:1px solid var(--border);border-radius:7px;padding:3px;}
.sort-btn{background:none;border:none;padding:.28rem .85rem;border-radius:5px;
  cursor:pointer;font-family:'Lora',serif;font-size:.78rem;
  color:var(--text2);transition:all .2s;}
.sort-btn.active{background:var(--gold-dim);color:var(--gold)}

/* ── Main ───────────────────────── */
main{max-width:1200px;margin:0 auto;padding:.4rem 1.5rem 5rem}

/* ── Accordion group ───────────────────────── */
.grp{margin-bottom:.4rem;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.grp-hdr{width:100%;display:flex;align-items:center;gap:.75rem;
  padding:.85rem 1.1rem;background:var(--bg2);border:none;cursor:pointer;
  text-align:left;transition:background .18s;}
.grp-hdr:hover{background:var(--card)}
.grp-ico{font-size:1.1rem;flex-shrink:0}
.grp-tit{flex:1;font-family:'Cinzel',serif;font-size:.82rem;
  color:var(--gold-l);letter-spacing:.04em;}
.grp-cnt{font-size:.7rem;color:var(--text3);background:var(--bg);
  padding:.12rem .5rem;border-radius:20px;border:1px solid var(--border)}
.grp-chv{font-size:.7rem;color:var(--text3);transition:transform .28s}
.grp.open .grp-chv{transform:rotate(180deg)}
.grp-body{display:none;padding:.85rem;background:var(--bg)}
.grp.open .grp-body{display:block}

/* ── Card grid ───────────────────────── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;
  overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s,box-shadow .18s;}
.card:hover{border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.45),0 0 20px rgba(200,164,76,0.07);}
.c-thumb{position:relative;aspect-ratio:16/9;background:var(--bg2);overflow:hidden}
.c-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .32s}
.card:hover .c-thumb img{transform:scale(1.06)}
.c-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1e36,#0e1020);color:var(--text3);font-size:.75rem;font-style:italic}
.c-ov{position:absolute;inset:0;background:transparent;display:flex;
  align-items:center;justify-content:center;transition:background .18s;}
.card:hover .c-ov{background:rgba(0,0,0,.28)}
.c-play{width:42px;height:42px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.65);transition:opacity .18s,transform .18s;}
.card:hover .c-play{opacity:1;transform:scale(1)}
.c-play svg{fill:#0d1022;margin-left:3px}
.c-dur{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.75);
  color:#ccc;font-size:.62rem;padding:1px 5px;border-radius:3px;font-family:sans-serif}
.c-lvl{position:absolute;top:5px;left:5px;font-size:.6rem;padding:2px 6px;
  border-radius:20px;font-family:sans-serif;font-weight:700;letter-spacing:.04em}
.lv-adv{background:rgba(90,84,184,.82);color:#d0ccff}
.lv-hi{background:rgba(160,90,30,.85);color:#ffd4a0}
.lv-med{background:rgba(30,130,80,.85);color:#a0ffd4}
.lv-est{background:rgba(150,30,70,.85);color:#ffa0cc}
.c-info{padding:.6rem .7rem .7rem}
.c-badge{display:inline-block;font-size:.6rem;color:var(--text2);
  background:var(--bg2);border:1px solid var(--border);
  padding:1px 5px;border-radius:3px;margin-bottom:.2rem}
.c-date{font-size:.62rem;color:var(--text3);font-family:sans-serif;margin-bottom:.15rem}
.c-title{font-size:.78rem;line-height:1.45;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-notes{font-size:.68rem;color:var(--gold);font-style:italic;margin-top:.25rem;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* ── Video modal ───────────────────────── */
.v-overlay{position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.88);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:1rem;}
.v-modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;max-width:900px;width:100%;position:relative;}
.v-close{position:absolute;top:.55rem;right:.55rem;z-index:10;
  background:rgba(0,0,0,.7);border:none;color:#fff;font-size:1.1rem;
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;}
.v-close:hover{background:rgba(200,164,76,.45)}
#v-frame{aspect-ratio:16/9;width:100%}
#v-frame iframe{width:100%;height:100%;border:none}
.v-ext{width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:var(--bg);color:var(--text2);font-style:italic}
.v-ext a{color:var(--gold);text-decoration:none;font-size:1rem;
  border:1px solid var(--gold);padding:.5rem 1.4rem;border-radius:7px;
  transition:background .2s;}
.v-ext a:hover{background:var(--gold-dim)}
.v-title{padding:.6rem 1rem;font-size:.82rem;color:var(--text2);
  font-style:italic;border-top:1px solid var(--border)}

@media(max-width:600px){
  .cgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .hdr{padding:0 .8rem;gap:.8rem}
  .logo-tx{display:none}
  main{padding:.3rem .8rem 4rem}
  .sort-bar{padding:.6rem .8rem}
}
</style>
</head>

/* ═══════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════ */
const SKEY = 'sy_sadhana_auth';

function handleCredentialResponse(resp) {
  try {
    const raw = resp.credential.split('.')[1];
    const pad = raw + '='.repeat((4 - raw.length % 4) % 4);
    const p = JSON.parse(atob(pad.replace(/-/g,'+').replace(/_/g,'/')));
    if (p.hd !== 'sahajayoga.bg') {
      showAuthErr('Само членове на sahajayoga.bg могат да достъпят тази страница.');
      return;
    }
    const auth = {name: p.given_name || p.name, email: p.email, pic: p.picture, exp: p.exp};
    sessionStorage.setItem(SKEY, JSON.stringify(auth));
    launchApp(auth);
  } catch(e) {
    showAuthErr('Грешка при удостоверяване. Моля опитайте отново.');
  }
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.style.display = 'block';
}

function checkSession() {
  try {
    const s = sessionStorage.getItem(SKEY);
    if (!s) return false;
    const a = JSON.parse(s);
    if (a.exp * 1000 < Date.now()) { sessionStorage.removeItem(SKEY); return false; }
    launchApp(a);
    return true;
  } catch(e) { return false; }
}

function launchApp(auth) {
  document.getElementById('auth-screen').hidden = true;
  document.getElementById('app').hidden = false;
  const pic = document.getElementById('user-pic');
  if (auth.pic) { pic.src = auth.pic; } else { pic.style.display = 'none'; }
  document.getElementById('user-nm').textContent = auth.name || auth.email;
  render();
}

function logout() {
  sessionStorage.removeItem(SKEY);
  document.getElementById('app').hidden = true;
  document.getElementById('auth-screen').hidden = false;
  try { google.accounts.id.disableAutoSelect(); } catch(e){}
}

/* ═══════════════════════════════════════════════════
   STATE & NAV
═══════════════════════════════════════════════════ */
let TAB = 'lectures', SORT = 'group';

function switchTab(t) {
  TAB = t; SORT = 'group';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='lectures')||(i===1&&t==='pujas')));
  document.querySelectorAll('.sort-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('sort-btn-group').textContent = t === 'lectures' ? 'По ниво' : 'По вид';
  render();
}

function setSort(s) {
  SORT = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s));
  render();
}

function toggleGrp(btn) { btn.closest('.grp').classList.toggle('open'); }

/* ═══════════════════════════════════════════════════
   VIDEO
═══════════════════════════════════════════════════ */
function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

document.getElementById('main').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const url = card.dataset.url, title = card.dataset.title;
  document.getElementById('v-title').textContent = title;
  const frame = document.getElementById('v-frame');
  if (url.includes('vimeo')) {
    frame.innerHTML = `<div class="v-ext"><p>Видеото е в Vimeo</p><a href="${url}" target="_blank" rel="noopener">Отвори в Vimeo →</a></div>`;
  } else {
    const id = ytId(url);
    if (id) frame.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  }
  document.getElementById('v-overlay').hidden = false;
  document.body.style.overflow = 'hidden';
});

function closeVideo() {
  document.getElementById('v-overlay').hidden = true;
  document.getElementById('v-frame').innerHTML = '';
  document.body.style.overflow = '';
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
const LVL_CFG = {
  med:  {cls:'lv-med', lbl:'СР. НАПРЕДНАЛИ', title:'Средно напреднали', ico:'🌱'},
  adv:  {cls:'lv-adv', lbl:'НАПРЕДНАЛИ',     title:'Напреднали',        ico:'🌟'},
  hi:   {cls:'lv-hi',  lbl:'МН. НАПРЕДНАЛИ', title:'Много напреднали',  ico:'✨'},
  est:  {cls:'lv-est', lbl:'УСТАНОВЕНИ',      title:'За установени йоги',ico:'👁'},
};

function card(item, badge) {
  const id = ytId(item.url);
  const thumb = id
    ? `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="" loading="lazy">`
    : `<div class="c-placeholder">Vimeo</div>`;
  const lc = item.level ? LVL_CFG[item.level] : null;
  const lvlHtml = lc ? `<span class="c-lvl ${lc.cls}">${lc.lbl}</span>` : '';
  const durHtml = item.dur ? `<div class="c-dur">${item.dur}</div>` : '';
  const badgeHtml = badge ? `<div class="c-badge">${badge}</div>` : '';
  const dateHtml = item.date ? `<div class="c-date">${item.date.replace(/-/g,'.')}</div>` : '';
  const notesHtml = item.notes ? `<div class="c-notes">${item.notes}</div>` : '';
  const safeUrl = (item.url||'').replace(/"/g,'&quot;');
  const safeTitle = (item.title||'').replace(/"/g,'&quot;');
  return `<div class="card" data-url="${safeUrl}" data-title="${safeTitle}">
    <div class="c-thumb">${thumb}<div class="c-ov"><div class="c-play"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 1.5l9 5.5-9 5.5z"/></svg></div></div>${lvlHtml}${durHtml}</div>
    <div class="c-info">${badgeHtml}${dateHtml}<div class="c-title">${item.title}</div>${notesHtml}</div>
  </div>`;
}

function group(grp, open) {
  const sorted = [...grp.items].sort((a,b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
  return `<div class="grp${open?' open':''}">
    <button class="grp-hdr" onclick="toggleGrp(this)">
      <span class="grp-ico">${grp.icon}</span>
      <span class="grp-tit">${grp.title}</span>
      <span class="grp-cnt">${sorted.length}</span>
      <span class="grp-chv">▼</span>
    </button>
    <div class="grp-body"><div class="cgrid">${sorted.map(i=>card(i)).join('')}</div></div>
  </div>`;
}

function render() {
  const el = document.getElementById('main');
  if (TAB === 'lectures') {
    if (SORT === 'group') {
      const order = ['med','adv','hi','est'];
      const byLvl = {};
      LECTURES.forEach(l => { (byLvl[l.level]||(byLvl[l.level]=[])).push(l); });
      el.innerHTML = order.filter(k=>byLvl[k]).map((k,i) => {
        const cfg = LVL_CFG[k];
        const g = {icon:cfg.ico, title:cfg.title, items:byLvl[k]};
        return group(g, i===0);
      }).join('');
    } else {
      const sorted = [...LECTURES].sort((a,b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
      el.innerHTML = `<div class="cgrid">${sorted.map(l=>card(l)).join('')}</div>`;
    }
  } else {
    if (SORT === 'group') {
      el.innerHTML = PUJA_GROUPS.map((g,i) => group(g, i===0)).join('');
    } else {
      const all = [];
      PUJA_GROUPS.forEach(g => g.items.forEach(p => all.push({...p, _grp:g.title})));
      all.sort((a,b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
      el.innerHTML = `<div class="cgrid">${all.map(p=>card(p,p._grp)).join('')}</div>`;
    }
  }
}

/* ── Init ── */
window.addEventListener('DOMContentLoaded', () => {
  if (!checkSession()) document.getElementById('auth-screen').hidden = false;
});
</script>
